name: Arcanum CI

on:
  push:
    branches: [main]
    paths:
      - 'arcanum/**'
      - '.github/workflows/arcanum-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'arcanum/**'
      - '.github/workflows/arcanum-ci.yml'

jobs:
  build:
    name: CMake Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository }}/arcanum-ci:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: arcanum-${{ github.job }}
          max-size: 2G

      - name: Configure (dev preset)
        working-directory: arcanum
        run: cmake --preset dev

      - name: Build (dev preset)
        working-directory: arcanum
        run: cmake --build --preset dev

      - name: Configure (release preset)
        working-directory: arcanum
        run: cmake --preset release

      - name: Build (release preset)
        working-directory: arcanum
        run: cmake --build --preset release
