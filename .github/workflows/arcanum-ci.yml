name: Arcanum CI

on:
  push:
    branches: [main]
    paths:
      - 'arcanum/**'
      - '.github/workflows/arcanum-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'arcanum/**'
      - '.github/workflows/arcanum-ci.yml'

jobs:
  build:
    name: CMake Build (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository }}/arcanum-ci:latest

    strategy:
      fail-fast: false
      matrix:
        preset: [dev, release]

    steps:
      - uses: actions/checkout@v4

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: arcanum-${{ matrix.preset }}
          max-size: 2G

      - name: Configure
        working-directory: arcanum
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        working-directory: arcanum
        run: cmake --build --preset ${{ matrix.preset }}

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository }}/arcanum-ci:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: arcanum-clang-tidy
          max-size: 2G

      - name: Configure + generate TableGen headers
        working-directory: arcanum
        run: |
          cmake --preset dev
          cmake --build --preset dev --target MLIRECSL

      - name: Run clang-tidy
        working-directory: arcanum
        run: |
          find . -type f -name '*.cpp' -not -path './build/*' -print0 \
            | xargs -0 --no-run-if-empty \
                clang-tidy -p build/dev --quiet --warnings-as-errors='*'

  header-guards:
    name: Header Guards
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository }}/arcanum-ci:latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate include guards
        working-directory: arcanum
        run: ./scripts/check-include-guards.sh

  docs:
    name: Doxygen Docs
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository }}/arcanum-ci:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          apt-get update
          apt-get install -y --no-install-recommends doxygen graphviz
          rm -rf /var/lib/apt/lists/*

      - name: Configure
        working-directory: arcanum
        run: cmake --preset dev

      - name: Build docs
        working-directory: arcanum
        run: cmake --build --preset dev --target docs

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcanum-doxygen-html
          path: arcanum/build/dev/docs/html
          if-no-files-found: error
          retention-days: 14
